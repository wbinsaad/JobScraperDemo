name: Jobflow Engine Test

on:
  push:
    paths:
      - 'jobflow_engine/**'
      - "pytest.ini"
      - ".github/workflows/jobflow-engine-tests.yml"
  pull_request:
    paths:
      - 'jobflow_engine/**'
      - "pytest.ini"
      - ".github/workflows/jobflow-engine-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: jobflow_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jobflow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/jobflow_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r jobflow_engine/requirements.txt
          pip install -r jobflow_engine/requirements-dev.txt

      - name: Run tests
        run: pytest --disable-warnings jobflow_engine/tests -v