name: Jobflow Engine Test

on:
  push:
    paths:
      - 'jobflow_engine/**'
  pull_request:
    paths:
      - 'jobflow_engine/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install dependencies
        working-directory: jobflow_engine
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: jobflow_engine
        run: |
          pytest --disable-warnings -v